<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Summarizer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>网页助手</h1>
      <div class="status-row">
        <span>服务状态</span>
        <span id="service-status" class="status pending">检查中</span>
      </div>
      <section class="feature-section">
        <h2>选择功能</h2>
        <label class="input-label" for="feature-select">功能</label>
        <select id="feature-select" class="feature-select"></select>
        <p id="feature-description" class="feature-description"></p>
      </section>
      <section id="feature-input-section" class="input-section hidden">
        <label class="input-label" for="feature-input">商品名称</label>
        <input id="feature-input" class="feature-input" type="text" placeholder="例如：机械键盘" />
      </section>
      <section id="yuque-collect-options-section" class="input-section hidden">
        <label class="checkbox-label">
          <input type="checkbox" id="yuque-export-users" />
          导出用户需求
        </label>
      </section>
      <button id="action-button" type="button">执行当前功能</button>
      <div class="viewer-links hidden">
        <button id="open-test-plan" type="button" class="viewer-link-btn">测试规划</button>
        <button id="open-test-cases" type="button" class="viewer-link-btn">用例详情</button>
      </div>
      <button id="run-all-button" type="button" class="hidden">全套执行</button>
      <section id="best-item-section" class="result-section hidden">
        <h2>推荐商品</h2>
        <div id="best-item-card" class="best-item-card"></div>
      </section>
      <section id="cc-cases-section" class="result-section hidden">
        <div class="cc-cases-header">
          <h2>测试用例</h2>
          <button id="cc-clear-button" type="button" class="cc-clear-button" title="清理状态" aria-label="清理状态">
            <svg viewBox="0 0 24 24" class="cc-clear-icon" aria-hidden="true">
              <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm1 6h2v9h-2V9Zm4 0h2v9h-2V9ZM7 9h2v9H7V9Z"></path>
            </svg>
          </button>
        </div>
        <ul id="cc-cases-list" class="cc-cases-list">
          <li class="empty-item">暂无测试用例</li>
        </ul>
      </section>
      <section class="result-section">
        <h2 id="summary-title">三句总结</h2>
        <ol id="summary-list" class="summary-list">
          <li>暂无结果</li>
        </ol>
      </section>
      <section class="result-section">
        <h2 id="functions-title">页面功能</h2>
        <ul id="functions-list" class="functions-list">
          <li class="empty-item">暂无结果</li>
        </ul>
      </section>
      <p id="message" class="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
