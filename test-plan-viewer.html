<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC 自动化测试规划</title>
<style>
  :root {
    --bg: #f5f6fa;
    --card: #fff;
    --border: #e4e7ed;
    --text: #303133;
    --muted: #909399;
    --primary: #409eff;
    --success: #67c23a;
    --warning: #e6a23c;
    --danger: #f56c6c;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
  }

  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { color: var(--muted); font-size: 13px; }

  .stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-size: 13px;
  }
  .stat { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background .15s; }
  .stat:hover { background: var(--bg); }
  .stat.active-filter { background: #ecf5ff; }
  .stat-badge {
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .stat-badge.done   { background: #f0f9eb; color: var(--success); }
  .stat-badge.todo   { background: #fdf6ec; color: var(--warning); }
  .stat-badge.skip   { background: #f4f4f5; color: var(--muted); }

  .toolbar {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-input {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    width: 260px;
    background: #fff;
    color: var(--text);
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--primary); }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px 48px;
  }

  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .section-title {
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .subsection-title {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: #f9f9fb;
    border-bottom: 1px solid #f0f0f2;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 10px 16px;
    background: #fafbfc;
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 16px;
    border-bottom: 1px solid #f0f2f5;
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafcff; }

  tr.hidden { display: none; }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    font-weight: 500;
  }
  .status.done { background: #f0f9eb; color: var(--success); }
  .status.todo { background: #fdf6ec; color: var(--warning); }
  .status.skip { background: #f4f4f5; color: var(--muted); }

  code {
    background: #f0f2f5;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 12px;
    color: #c0392b;
  }

  .dep-tag {
    display: inline-block;
    font-size: 11px;
    background: #ecf5ff;
    color: var(--primary);
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 4px;
  }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  .priority-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .priority-title {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
  }
  .priority-body {
    padding: 12px 20px;
  }
  .priority-body ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 6px 0;
  }
  .priority-body li code {
    font-size: 12px;
  }
  .priority-desc {
    color: var(--muted);
    font-size: 12px;
    margin-left: 6px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .summary-num { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .summary-num.done { color: var(--success); }
  .summary-num.todo { color: var(--warning); }
  .summary-num.skip { color: var(--muted); }
  .summary-num.total { color: var(--primary); }
  .summary-label { color: var(--muted); font-size: 12px; }
</style>
</head>

<header>

// ── Render ─────────────────────────────────────────────────────────────────────
const STATUS_MAP = {
  done: { cls: "done", label: "✅ 已实现" },
  todo: { cls: "todo", label: "🔲 待实现" },
  skip: { cls: "skip", label: "⏭️ 暂不实现" },
};

let activeFilter = "all";
let searchText = "";

function countAll() {
  let done = 0, todo = 0, skip = 0;
  for (const sec of PLAN.sections) {
    for (const sub of sec.subsections) {
      for (const row of sub.rows) {
        if (row[0] === "done") done++;
        else if (row[0] === "todo") todo++;
        else if (row[0] === "skip") skip++;
      }
    }
  }
  return { done, todo, skip };
}

function renderSummary() {
  const { done, todo, skip } = countAll();
  document.getElementById("cnt-done").textContent = done;
  document.getElementById("cnt-todo").textContent = todo;
  document.getElementById("cnt-skip").textContent = skip;
  return { done, todo, skip, total: done + todo + skip };
}

function escHtml(s) {
  if (!s) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderCell(val) {
  if (!val) return '<span style="color:#c0c4cc">—</span>';
  // code backtick
  let html = escHtml(val).replace(/`([^`]+)`/g, "<code>$1</code>");
  return html;
}

function buildRows(rows) {
  const q = searchText.toLowerCase();
  let html = "";
  let visibleCount = 0;
  for (const row of rows) {
    const [status, id, name, ...rest] = row;
    const dep = rest[rest.length - 1];
    const desc = rest.slice(0, -1).join(" ");

    const matchFilter = activeFilter === "all" || status === activeFilter;
    const matchSearch = !q || id.toLowerCase().includes(q) || name.toLowerCase().includes(q) || (desc && desc.toLowerCase().includes(q));

    const hidden = !matchFilter || !matchSearch;
    if (!hidden) visibleCount++;

    const s = STATUS_MAP[status] || STATUS_MAP.todo;
    html += `<tr class="${hidden ? "hidden" : ""}" data-status="${status}" data-id="${escHtml(id)}">`;
    html += `<td><span class="status ${s.cls}">${s.label}</span></td>`;
    html += `<td><code>${escHtml(id)}</code></td>`;
    html += `<td>${escHtml(name)}</td>`;
    if (rest.length > 1) {
      html += `<td>${renderCell(desc || null)}</td>`;
    }
    if (dep) {
      html += `<td><code>${escHtml(dep)}</code></td>`;
    } else if (rest.length > 0) {
      html += `<td><span style="color:#c0c4cc">—</span></td>`;
    }
    html += `</tr>`;
  }
  return { html, visibleCount };
}

function renderContent() {
  const container = document.getElementById("content");
  const { done, todo, skip, total } = renderSummary();
  let html = "";

  // Summary grid
  html += `<div class="summary-grid">
    <div class="summary-item"><div class="summary-num total">${total}</div><div class="summary-label">合计</div></div>
    <div class="summary-item"><div class="summary-num done">${done}</div><div class="summary-label">✅ 已实现</div></div>
    <div class="summary-item"><div class="summary-num todo">${todo}</div><div class="summary-label">🔲 待实现</div></div>
    <div class="summary-item"><div class="summary-num skip">${skip}</div><div class="summary-label">⏭️ 暂不实现</div></div>
  </div>`;

  // Sections
  for (const sec of PLAN.sections) {
    let secHtml = `<div class="section-title">${escHtml(sec.title)}</div>`;
    let secVisible = 0;

    for (const sub of sec.subsections) {
      const { html: rowsHtml, visibleCount } = buildRows(sub.rows);
      secVisible += visibleCount;

      if (sub.title) {
        secHtml += `<div class="subsection-title">${escHtml(sub.title)}</div>`;
      }
      if (sub.note) {
        secHtml += `<div style="padding:8px 20px;font-size:12px;color:var(--muted);background:#fffef5;border-bottom:1px solid #f5f0d0;">${escHtml(sub.note)}</div>`;
      }
      secHtml += `<table><thead><tr>`;
      for (const col of sub.cols) {
        secHtml += `<th>${escHtml(col)}</th>`;
      }
      secHtml += `</tr></thead><tbody>${rowsHtml}</tbody></table>`;
    }

    const secCard = `<div class="section-card" style="${secVisible === 0 ? "display:none" : ""}">${secHtml}</div>`;
    html += secCard;
  }

  // Priority
  html += `<div style="margin-top:8px;margin-bottom:8px;font-size:13px;font-weight:600;color:var(--muted);padding:0 4px;">优先级建议</div>`;
  for (const p of PLAN.priorities) {
    const colorMap = { P0: "#f56c6c", P1: "#e6a23c", P2: "#909399" };
    html += `<div class="priority-section">
      <div class="priority-title" style="color:${colorMap[p.level] || "#303133"}">
        ${escHtml(p.level)} — ${escHtml(p.label)}
      </div>
      <div class="priority-body"><ul>`;
    for (const item of p.items) {
      html += `<li><code>${escHtml(item.id)}</code>${item.note ? `<span class="priority-desc">${escHtml(item.note)}</span>` : ""}</li>`;
    }
    html += `</ul></div></div>`;
  }

  container.innerHTML = html;
}

// ── Filter & search ────────────────────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderContent();
  });
});

document.querySelectorAll(".stat[data-filter]").forEach(stat => {
  stat.addEventListener("click", () => {
    const f = stat.dataset.filter;
    if (activeFilter === f) {
      activeFilter = "all";
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === "all"));
    } else {
      activeFilter = f;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === f));
    }
    stat.classList.toggle("active-filter", activeFilter === f);
    renderContent();
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchText = e.target.value.trim();
  renderContent();
});

renderContent();
</script>
